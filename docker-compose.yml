version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: universal-media-downloader:latest
    container_name: umd-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - LOG_LEVEL=INFO
      - DOWNLOAD_DIR=/app/downloads
      - CORS_ORIGINS=*
    volumes:
      - downloads_data:/app/downloads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  downloads_data:
    name: umd_downloads
  logs_data:
    name: umd_logs